<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | AI Cyber Analyzer</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
  <div class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html"><span class="brand-mark">A</span>AI Cyber Analyzer</a>
      <div class="nav-links">
        <a href="login.html">Login</a>
        <a href="dashboard.html">Dashboard</a>
      </div>
    </div>
  </div>

  <main class="container page-shell split">
    <section class="card">
      <span class="kicker">Create access</span>
      <h1 class="page-title">Register</h1>
      <p class="page-subtitle">Set up your analyst profile and start scanning suspicious content.</p>
      <form class="form-grid" data-register-form>
        <label>Name<input type="text" name="name" required placeholder="Your name" /></label>
        <label>Email<input type="email" name="email" required placeholder="analyst@example.com" /></label>
        <label>Password<input type="password" name="password" required placeholder="Create a password" /></label>
        <button class="btn btn-primary" type="submit">Create account</button>
      </form>
    </section>

    <aside class="card">
      <h2>Built for growth</h2>
      <div class="list">
        <div class="list-item">JWT auth for private reports</div>
        <div class="list-item">MongoDB-ready data model</div>
        <div class="list-item">Easy path to AI integration</div>
      </div>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
