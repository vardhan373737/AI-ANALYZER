<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MITRE ATT&CK coverage matrix view for AI Cyber Analyzer reports." />
  <meta name="theme-color" content="#08111f" />
  <title>MITRE Matrix | AI Cyber Analyzer</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html"><span class="brand-mark">A</span>AI Cyber Analyzer</a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="analyzer.html">Analyzer</a>
        <a href="report.html">Reports</a>
        <button data-logout>Logout</button>
      </div>
    </div>
  </div>

  <main class="container page-shell">
    <section class="section-head">
      <div>
        <span class="kicker">Threat framework view</span>
        <h1 class="page-title">MITRE ATT&CK Matrix</h1>
        <p class="page-subtitle">Techniques mapped from report findings and IOC intelligence signals.</p>
      </div>
    </section>

    <section class="section" data-mitre-summary>
      <div class="list-item">Loading MITRE coverage summary...</div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2>Techniques</h2>
          <p class="muted">Observed techniques ranked by frequency across recent reports.</p>
        </div>
      </div>
      <div class="report-filters" data-mitre-filters>
        <label>
          Tactic
          <select data-mitre-tactic-filter>
            <option value="all">All tactics</option>
          </select>
        </label>
        <label>
          Severity
          <select data-mitre-severity-filter>
            <option value="all">All severities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </label>
        <label>
          History window
          <select data-mitre-history-filter>
            <option value="all">All time</option>
            <option value="90d">Last 90 days</option>
            <option value="30d">Last 30 days</option>
            <option value="7d">Last 7 days</option>
          </select>
        </label>
      </div>
      <div data-mitre-matrix>
        <div class="list-item">Loading MITRE matrix...</div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
